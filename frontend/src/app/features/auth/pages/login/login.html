<div class="login-wrapper">
  <div class="login-card">
    
    <div class="login-header">
      <img src="assets/logo-centre-funeraire.png" alt="Logo Centre Funéraire" class="logo">
      <h1>E-Funérailles</h1>
      <p class="subtitle">Gestion digitale des obsèques</p>
    </div>

    <form class="login-form">
      
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          placeholder="votre.email@efunerailles.tg"
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input 
          type="password" 
          id="password" 
          placeholder="........"
          autocomplete="current-password"
        >
      </div>

      <button type="submit" class="btn-submit">Se connecter</button>

      <div class="register-section">
        <p>Pas encore de compte ?</p>
        <button type="button" class="btn-register" routerLink="/register">Créer un compte</button>
      </div>

    </form>

    <hr class="divider">

    <div class="demo-section">
      <p class="demo-title">Comptes de démonstration :</p>
      <div class="demo-box">
        <p><strong>Admin:</strong> kofi.mensah&#64;efunerailles.tg / admin123</p>
      </div>
    </div>

  </div>
</div>
