<div class="auth-wrapper">
  <div class="auth-card">
    
    <div class="auth-header">
      <img src="assets/logo-centre-funeraire.png" alt="Logo Centre Funéraire" class="logo">
      <h1>Créer un compte</h1>
      <p class="subtitle">Rejoignez la plateforme E-Funérailles</p>
    </div>

    <form class="auth-form" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="fullName">Nom complet</label>
        <input 
          type="text" 
          id="fullName" 
          formControlName="fullName"
          placeholder="Ex: Jean Dupont"
        >
        <div *ngIf="isSubmitted && f['fullName'].errors" class="error-text">
          <small>Le nom est requis.</small>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email"
          placeholder="votre.email@efunerailles.tg"
        >
        <div *ngIf="isSubmitted && f['email'].errors" class="error-text">
          <small *ngIf="f['email'].errors['required']">L'email est requis.</small>
          <small *ngIf="f['email'].errors['email']">Format d'email invalide.</small>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password"
          placeholder="Minimum 6 caractères"
        >
        <div *ngIf="isSubmitted && f['password'].errors" class="error-text">
          <small *ngIf="f['password'].errors['required']">Le mot de passe est requis.</small>
          <small *ngIf="f['password'].errors['minlength']">Minimum 6 caractères.</small>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmer le mot de passe</label>
        <input 
          type="password" 
          id="confirmPassword" 
          formControlName="confirmPassword"
          placeholder="Répétez le mot de passe"
        >
        <div *ngIf="isSubmitted && registerForm.errors?.['mismatch']" class="error-text">
          <small>Les mots de passe ne correspondent pas.</small>
        </div>
      </div>

      <div *ngIf="successMessage" class="success-message" style="color: green; margin-bottom: 10px; font-size: 0.9em; text-align: center;">
        <strong>{{ successMessage }}</strong>
      </div>
      
      <div *ngIf="errorMessage" class="error-message" style="color: red; margin-bottom: 10px; font-size: 0.9em; text-align: center;">
        <strong>{{ errorMessage }}</strong>
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading">
        {{ isLoading ? 'Création en cours...' : 'S\'inscrire' }}
      </button>

    </form>

    <div class="auth-footer">
      <p>Déjà un compte ? <a routerLink="/login" class="link">Se connecter</a></p>
    </div>

  </div>
</div>
