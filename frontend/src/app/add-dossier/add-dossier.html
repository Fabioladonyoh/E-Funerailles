<div class="modal-backdrop">
  <div class="modal-container">
    <div class="modal-header">
      <h2>Nouveau Dossier Funéraire</h2>
      <button class="close-btn" (click)="close.emit()">×</button>
    </div>
    
    <form [formGroup]="dossierForm" (ngSubmit)="onSubmit()">
      <div class="form-body">
        <div class="form-group">
          <label>Nom du Défunt</label>
          <input type="text" formControlName="nom" placeholder="Ex: KOFFI">
        </div>
        <div class="form-group">
          <label>Prénom du Défunt</label>
          <input type="text" formControlName="prenom" placeholder="Ex: Jean">
        </div>
        <div class="form-group">
          <label>Date du décès</label>
          <input type="date" formControlName="dateDeces">
        </div>
        <div class="form-group">
          <label>Montant de la prestation (FCFA)</label>
          <input type="number" formControlName="montantTotal">
        </div>
        <div class="mb-3">
      <label class="form-label">Date de Naissance du Défunt</label>
      <input type="date" class="form-control" formControlName="dateNaissance">
    </div>

    <div class="mb-3">
      <label class="form-label">Lieu de Conservation (Morgue)</label>
      <input type="text" class="form-control" formControlName="lieuConservation" placeholder="Ex: Morgue de l'Hôpital Central">
    </div>
      </div>
      
      <div class="modal-footer">
        <button type="button" class="btn-secondary" (click)="close.emit()">Annuler</button>
        <button type="submit" class="btn-primary" [disabled]="dossierForm.invalid || isSubmitting">
        {{ isSubmitting ? 'Enregistrement...' : 'Enregistrer le Dossier' }}
        </button>
    </div>
    </form>
  </div>
</div>
